<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail AI - Inventory Management</title>
    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main Application Container (hidden by default) -->
    <div id="dashboard-container">
        <!-- Persistent Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-brain"></i> Retail AI</h3>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#ledger"><i class="fas fa-book"></i> Inventory Ledger</a>
                <a class="nav-link" href="#dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a class="nav-link" href="#insights"><i class="fas fa-lightbulb"></i> Insights</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Persistent Header -->
            <header class="app-header">
                <div id="current-datetime" class="text-muted"></div>
                <div class="profile-dropdown">
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="profileMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle"></i>
                            <span id="user-name" class="ms-2"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileMenuButton">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logout-btn">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Page Content (Dashboard, Ledger, etc.) -->
            <main class="container-fluid mt-4">
                <!-- Dashboard View -->
                <div id="dashboard-view">
                    <h1>Dashboard</h1>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card text-white bg-primary mb-3">
                                <div class="card-header">Total Inventory Value</div>
                                <div class="card-body">
                                    <h5 class="card-title" id="total-value">$0.00</h5>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-white bg-danger mb-3">
                                <div class="card-header">Critical Expiry Alerts</div>
                                <div class="card-body">
                                    <h5 class="card-title" id="expiry-alerts">0</h5>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-white bg-warning mb-3">
                                <div class="card-header">Low Stock Alerts</div>
                                <div class="card-body">
                                    <h5 class="card-title" id="low-stock-alerts">0</h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Inventory Ledger View -->
                <div id="ledger-view" class="mt-5">
                    <h1>Inventory Ledger</h1>
                    <div class="card">
                        <div class="card-body">
                            <div class="ledger-controls mb-3">
                                <button class="btn btn-info" id="voice-command-btn" title="Voice Assistant"><i class="fas fa-microphone"></i></button>
                                <button class="btn btn-secondary" onclick="document.getElementById('file-upload-input').click();" title="Upload CSV"><i class="fas fa-cloud-upload-alt"></i></button>
                                <button class="btn btn-success" id="manual-add-btn"><i class="fas fa-plus"></i> Add Product</button>
                                <input type="file" id="file-upload-input" class="hidden" accept=".csv">
                            </div>
                            <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Product Name</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body">
                                <!-- Product rows will be injected here by main.js -->
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>

                <!-- Insights View -->
                <div id="insights-view" class="mt-5">
                    <h1>Insights</h1>
                    <div class="row">
                        <div class="col-md-6">
                            <h4>Low Stock Trends</h4>
                            <ul id="low-stock-trends-list" class="list-group">
                                <!-- Low stock trends will be injected here -->
                            </ul>
                        </div>
                        <div class="col-md-6">
                            <h4>Unsold Items</h4>
                            <ul id="unsold-items-list" class="list-group">
                                <!-- Unsold items will be injected here -->
                            </ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script> 

</body>
</html>
