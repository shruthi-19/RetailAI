<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailAI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="app-header d-flex justify-content-between align-items-center px-4">
    <div class="brand">
        <h1 class="mb-0 text-black">RetailAI</h1>
    </div>

    <div>
        <div class="dropdown">
            <button class="btn btn-outline-light dropdown-toggle text-black" id="profile-button"
                data-bs-toggle="dropdown">
                Profile
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" href="#" id="logout-btn">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<!-- MAIN LAYOUT -->
<div class="app-container d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <ul class="nav flex-column">
            <li>
                <a class="nav-link active" href="#" data-view="dashboard-view">
                    Dashboard
                </a>
            </li>
            <li>
                <a class="nav-link" href="#" data-view="inventory-view">
                    Inventory Ledger
                </a>
            </li>
            <li>
                <a class="nav-link" href="#" data-view="insights-view">
                    Insights
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENT AREA -->
    <main class="content-area p-4 flex-grow-1">

        <!-- DASHBOARD VIEW -->
        <section id="dashboard-view" class="view">
            <h3 class="mb-4">Dashboard</h3>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card shadow-sm p-3">
                        <h6>Total Inventory Value</h6>
                        <h4 id="total-value">0</h4>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm p-3">
                        <h6>Critical Alerts</h6>
                        <h4 id="critical-alerts">0</h4>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm p-3">
                        <h6>Total Products</h6>
                        <h4 id="total-products">0</h4>
                    </div>
                </div>
            </div>
        </section>

        <!-- INVENTORY VIEW -->
        <section id="inventory-view" class="view d-none">
            <h3 class="mb-4">Inventory Ledger</h3>

            <div class="card shadow-sm">
                <div class="card-body">

                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body">
                        </tbody>
                    </table>

                </div>
            </div>
        </section>

        <!-- INSIGHTS VIEW -->
        <section id="insights-view" class="view d-none">
            <h3 class="mb-4">Insights</h3>

            <div class="card shadow-sm p-3">
                <ul id="insights-list" class="list-group">
                    <!-- Filled dynamically -->
                </ul>
            </div>
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
